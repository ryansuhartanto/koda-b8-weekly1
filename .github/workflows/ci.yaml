name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version: latest

      - run: bun install
      - run: |
          bun run test \
            --test-reporter spec \
            --test-reporter-destination stdout \
            --test-reporter lcov \
            --test-reporter-destination lcov.info

      - uses: codecov/codecov-action@v6
        with:
          file: ./lcov.info
